###########################################################
### Welcome to Beautiful Jekyll!
###########################################################

############################
# --- Required options --- #
############################

title: Eunmi Cho
author: Eunmi Cho

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  CV: "cv"
  Research: "research"

################
# --- Logo --- #
################

#avatar: "assets/img/img.jpg"
#avatar-size: 100px
#round-avatar: true

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  email: "eunmicho@yonsei.ac.kr"

###########################
# --- General options --- #
###########################

url-pretty: "cho-eunmi.github.io"

title-on-all-pages: true
excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: true
post_search: true
edit_page_button: true
navbar-var-length: false

######################################
# --- Colours / background image --- #
######################################

page-col: "#FFFFFF"
text-col: "#1a1a1a"
link-col: "#333333"
hover-col: "#555555"
navbar-col: "#FFFFFF"
navbar-text-col: "#1a1a1a"
navbar-border-col: "#e0e0e0"
footer-col: "#f8f8f8"
footer-text-col: "#777777"
footer-link-col: "#333333"
footer-hover-col: "#000000"

################
# --- Misc --- #
################

date_format: "%B %-d, %Y"

#################################################################################
# --- You don't need to touch anything below here (but you can if you want) --- #
#################################################################################

timezone: "Asia/Seoul"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap

site-css:
  - "/assets/css/custom.css"

